><span class="line">        g.drawRoundRect(<span class="number">100</span>, <span class="number">100</span>, <span class="number">300</span>, <span class="number">100</span>, <span class="number">40</span>, <span class="number">40</span>);</span><br><span class="line">        g.setFont(<span class="keyword">new</span> Font(<span class="string">&quot;Helvetica&quot;</span>, Font.PLAIN, <span class="number">30</span>));</span><br><span class="line">        g.setColor(Color.CYAN);</span><br><span class="line">        g.drawString(<span class="string">&quot;Hello world!&quot;</span>, <span class="number">150</span>, <span class="number">150</span>);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title">main</span><span class="params">(String[] args)</span> </span>&#123;</span><br><span class="line">        Frame f = <span class="keyword">new</span> Main();</span><br><span class="line">        Button b = <span class="keyword">new</span> Button(<span class="string">&quot;一个按钮&quot;</span>);</span><br><span class="line">        Label l = <span class="keyword">new</span> Label(<span class="string">&quot;标签&quot;</span>);</span><br><span class="line">        b.setBounds(<span class="number">100</span>, <span class="number">250</span>, <span class="number">100</span>, <span class="number">30</span>);</span><br><span class="line">        b.setFont(<span class="keyword">new</span> Font(<span class="string">&quot;仿宋&quot;</span>, Font.PLAIN, <span class="number">10</span>));</span><br><span class="line">        l.setBounds(<span class="number">100</span>, <span class="number">200</span>, <span class="number">60</span>, <span class="number">30</span>);</span><br><span class="line">        f.add(l);</span><br><span class="line">        f.add(b);</span><br><span class="line">        f.s     });

    })
  })
